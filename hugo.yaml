baseURL: "https://wenxiaoshi.github.io/"
languageCode: zh-cn
title: "Wenshy"
theme: hugo-theme-stack

defaultContentLanguage: zh-cn

pagination:
  pagerSize: 10

languages:
  zh-cn:
    languageName: 中文
    weight: 1

params:
  mainSections:
    - post
  featuredImageField: image
  rssFullContent: true
  favicon: 

  footer:
    since: 2026

  dateFormat:
    published: 2006-01-02
    lastUpdated: 2006-01-02 15:04 MST

  sidebar:
    compact: false
    emoji: 🌙
    subtitle: " 技术分享 · 读书笔记 · 原创随笔"
    avatar: img/avatar.png

  article:
    math: false
    toc: true
    readingTime: true
    license:
      enabled: false

  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
    page:
      - type: toc

  colorScheme:
    toggle: true
    default: auto

  imageProcessing:
    cover:
      enabled: true
    content:
      enabled: true

menu:
  main:
    - identifier: about
      name: 关于我
      url: /about/
      weight: 1
      params:
        icon: user
    - identifier: tech
      name: 技术分享
      url: /categories/技术/
      weight: 2
      params:
        icon: hash
    - identifier: poetry
      name: 于是我开始写诗
      url: /categories/诗歌/
      weight: 3
      params:
        icon: infinity

  social:
    - identifier: github
      name: GitHub
      url: https://github.com/wenxiaoshi
      params:
        icon: brand-github
    # - identifier: rss
    #   name: RSS
    #   url: /index.xml
    #   params:
    #     icon: rss

related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 200

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
  highlight:
    noClasses: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

enableRobotsTXT: true

taxonomies:
  category: categories
  tag: tags
